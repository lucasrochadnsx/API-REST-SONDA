server:
  port: 8080

spring:
  application:
    name: aeronaveV2

  datasource:
    url: jdbc:postgresql://localhost:5432/aeronave_db
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  jpa:
    open-in-view: true
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

app:
  cors:
    allowed-origins: "http://localhost:5173"